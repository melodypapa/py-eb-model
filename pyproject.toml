[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "py_eb_model"
version = "1.3.0"
license = {text = "MIT"}
description = "The parser for EB XDM file"
readme = "README.md"
requires-python = ">=3.9"
keywords = ["EB", "Tresos", "XDM"]
authors = [
    {name = "melodypapa", email = "melodypapa@outlook.com"}
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Environment :: Console",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Operating System :: OS Independent",
]

dependencies = [
    "openpyxl",
]

[project.optional-dependencies]
dev = ["pytest-cov", "ruff", "mypy"]

[project.urls]
Homepage = "https://github.com/melodypapa/py-eb-model"
Repository = "https://github.com/melodypapa/py-eb-model"
Issues = "https://github.com/melodypapa/py-eb-model/issues"

